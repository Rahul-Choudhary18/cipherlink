<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decrypt File — SecureComm</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='start_decryption.css') }}">
</head>
<body>
<div class="decrypt-container">
  <div class="decrypt-card">

    <h1>🔓 Decrypt File</h1>
    <p>Select your keys and the encrypted file to verify &amp; decrypt</p>

    <form method="POST">

      <label>📁 Encrypted File (.secure)</label>
      <select name="encrypted_file" required>
        <option value="">— Choose File —</option>
        {% for file in encrypted_files %}
          <option value="{{ file }}">{{ file }}</option>
        {% endfor %}
      </select>

      <label>🔑 Your Private Key (Decrypts the AES key)</label>
      <select name="private_key" required>
        <option value="">— Choose Private Key —</option>
        {% for key in my_keys %}
          <option value="{{ key }}">{{ key }}</option>
        {% endfor %}
      </select>

      <label>👤 Sender & Key (to verify signature)</label>
      <select name="sender_info" id="sender_info_select" required>
        <option value="">— Choose Sender's Key —</option>
        {% for item in public_keys %}
          <option value="{{ item.key }}" data-friend="{{ item.friend }}">
            {{ item.friend }} › {{ item.key }}
          </option>
        {% endfor %}
      </select>
      <input type="hidden" name="sender_friend" id="sender_friend_input">
      <input type="hidden" name="sender_key" id="sender_key_input">

      <script>
      const senderSel = document.getElementById("sender_info_select");
      senderSel.addEventListener("change", function() {
        const opt = senderSel.options[senderSel.selectedIndex];
        document.getElementById("sender_friend_input").value = opt.getAttribute("data-friend") || "";
        document.getElementById("sender_key_input").value = senderSel.value;
      });
      </script>

      <button type="submit">🔓 Decrypt &amp; Verify</button>
    </form>

    {% if decrypted_file %}
    <div class="success-box">
      <h3>✔ File Decrypted &amp; Signature Verified!</h3>
      <a href="/download_decrypted/{{ decrypted_file }}">
        <button class="download-btn">⬇ Download {{ decrypted_file }}</button>
      </a>
    </div>
    {% endif %}

    <a href="/decrypt_page" class="back-link">← Back to Decryption Center</a>
  </div>
</div>
</body>
</html>
