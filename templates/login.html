<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureComm — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="company-logo">
        <div class="logo-icon">🔐</div>
      </div>
      <h2>CIPHERLINK</h2>
      <p>Sign in to your encrypted communication vault</p>
    </div>

    <form class="login-form" action="/login" method="POST">

      <div class="form-group">
        <div class="input-wrapper">
          <input type="text" id="username" name="username" required autocomplete="username">
          <label for="username">Username</label>
          <span class="input-border"></span>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper password-wrapper">
          <input type="password" id="password" name="password" required autocomplete="current-password">
          <label for="password">Password</label>
          <button type="button" class="password-toggle" id="passwordToggle">
            <span class="toggle-icon"></span>
          </button>
          <span class="input-border"></span>
        </div>
      </div>

      <div class="form-options">
        <div class="remember-wrapper">
          <input type="checkbox" id="remember">
          <label for="remember" class="checkbox-label">
            <span class="checkbox-custom"></span>
            Keep me signed in
          </label>
        </div>
        <a href="/signup" class="forgot-password">Create Account →</a>
      </div>

      <button type="submit" class="login-btn">
        <span class="btn-text">Sign In</span>
      </button>
    </form>

    <div class="divider"><span>HYBRID ENCRYPTION</span></div>

    <div class="sso-options">
      <button type="button" class="sso-btn">🔑 RSA-2048</button>
      <button type="button" class="sso-btn">🛡 AES-128-EAX</button>
    </div>

    <div class="footer-links">
      <a href="#" class="footer-link">Secure Transfer</a>
      <span class="separator">•</span>
      <a href="#" class="footer-link">Digital Signatures</a>
      <span class="separator">•</span>
      <a href="#" class="footer-link">End-to-End</a>
    </div>

  </div>
</div>

<script>
const passwordToggle = document.getElementById("passwordToggle");
const passwordInput  = document.getElementById("password");
const toggleIcon     = document.querySelector(".toggle-icon");

passwordToggle.addEventListener("click", () => {
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    toggleIcon.classList.add("show-password");
  } else {
   
    passwordInput.type = "password";
    toggleIcon.classList.remove("show-password");
  }
});
</script>
</body>
</html>
