<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='signup.css') }}">

</head>

<body>

<div class="signup-container">

    <div class="signup-card">

        <div class="signup-header">

            <div class="logo">
                🔐
            </div>

            <h2>Create Secure Account</h2>

            <p>
                Join Secure Communication Platform
            </p>

        </div>

        <form action="/signup"
              method="POST"
              id="signupForm">

            <!-- Username -->
            <div class="form-group">

                <div class="input-box">

                    <input type="text"
                           name="username"
                           id="username"
                           required>

                    <label>Username</label>

                </div>

            </div>

            <!-- Password -->
            <div class="form-group">

                <div class="input-box password-box">

                    <input type="password"
                           name="password"
                           id="password"
                           required>

                    <label>Password</label>

                    <button type="button"
                            id="togglePassword"
                            class="toggle-btn">

                        👁

                    </button>

                </div>

            </div>

            <!-- Confirm Password -->
            <div class="form-group">

                <div class="input-box password-box">

                    <input type="password"
                           id="confirmPassword"
                           required>

                    <label>Confirm Password</label>

                </div>

            </div>

            <!-- Password Strength -->
            <div class="strength-container">

                <div class="strength-bar">

                    <div class="strength-fill"
                         id="strengthFill"></div>

                </div>

                <span id="strengthText">
                    Password Strength
                </span>

            </div>

            <!-- Error -->
            <p class="error-message"
               id="errorMessage"></p>

            <!-- Signup Button -->
            <button type="submit"
                    class="signup-btn">

                Create Account

            </button>

        </form>

        <div class="bottom-text">

            Already have an account?

            <a href="/login">
                Sign In
            </a>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='signup.js') }}"></script>

</body>

</html>
