<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Users — CipherLink</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>
<div class="dashboard-container">

    <div class="mobile-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="font-size:24px;">🔐</div>
            <h2 style="margin:0; font-size: 1.2rem; color: var(--text);">CipherLink</h2>
        </div>
        <button id="sidebarToggle" class="hamburger-btn">☰</button>
    </div>

    <div class="sidebar" id="sidebar">
        <div>
            <div class="logo-section desktop-only">
                <div class="logo">🔐</div>
                <h2>CipherLink</h2>
            </div>
            <div class="menu">
                <a href="/dashboard" class="menu-btn">
                    <span class="icon">⬡</span> <span class="text">Dashboard</span>
                </a>
                <a href="/friends_page" class="menu-btn">
                    <span class="icon">👥</span> <span class="text">Friends</span>
                </a>
                <a href="/groups" class="menu-btn">
                    <span class="icon">🌐</span> <span class="text">Groups</span>
                </a>
                <a href="/search_page" class="menu-btn active">
                    <span class="icon">🔍</span> <span class="text">Search People</span>
                </a>
            </div>
            <button id="themeToggle" class="theme-btn">
                <span id="themeIcon">☀️</span> <span id="themeText">Light Mode</span>
            </button>
        </div>
        <a href="/logout" class="logout-btn">⏻ Logout</a>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Search <span>People</span></h1>
            <p style="color: var(--muted); margin-top: 5px;">Find and connect with other users securely.</p>
        </div>

        <div class="card" style="max-width: 500px; margin-top: 30px;">
            <form action="/search_users" method="POST" style="display: flex; gap: 10px;">
                <input type="text" name="search" placeholder="Enter username..." required>
                <button type="submit" class="action-btn" style="width: auto; padding: 14px 24px;">Search</button>
            </form>

            {% if found_user %}
                <div style="margin-top: 25px; padding: 15px; background: rgba(56,189,248,0.1); border: 1px solid var(--accent); border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-weight: bold; font-size: 16px;">{{ found_user }}</span>
                    <a href="/send_request/{{ found_user }}" style="background: var(--accent); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px;">Add Friend</a>
                </div>
            {% endif %}

            {% if message %}
                <p style="margin-top: 20px; color: var(--red); font-weight: bold;">{{ message }}</p>
            {% endif %}
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
